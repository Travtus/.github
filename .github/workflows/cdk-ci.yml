name: CDK CI (lint, types, synth)

# Reusable correctness gate for CDK (Python/uv) repos: ruff + mypy, then a
# `cdk synth` per environment (which runs the construct library's cdk-nag SOC2
# checks and fails on findings). Companion to cdk-deploy.yml. Callers add the
# pull_request/push triggers.
#
# Private Travtus git deps (e.g. platform-infra-toolkit) are resolved by minting
# a short-lived, repo-scoped token from the platform-admin GitHub App — same
# pattern as pr_size_check.yml. The App must be installed on the dependency repo
# with contents:read. No long-lived PAT.

on:
  workflow_call:
    secrets:
      PLATFORM_ADMIN_APP_PRIVATE_KEY:
        required: true
        description: "Private key of the platform-admin GitHub App (mints the dep-fetch token)."
    inputs:
      APP:
        type: string
        required: true
        description: "Path to the CDK app entrypoint, e.g. deploy/app.py."
      ENVS:
        type: string
        required: false
        default: '["dev","qa","uat"]'
        description: 'JSON array of envs to synth, e.g. ["dev","qa","uat"].'
      MYPY_PATH:
        type: string
        required: false
        default: "src"
        description: "Path passed to `mypy`, e.g. src or deploy."
      DEP_REPOS:
        type: string
        required: false
        default: "platform-infra-toolkit"
        description: "Private repo(s) the App token may read for uv sync (newline/space separated)."
      WORKING_DIRECTORY:
        type: string
        required: false
        default: "."
        description: "Directory containing pyproject.toml / cdk.json."
      PYTHON_VERSION:
        type: string
        required: false
        default: "3.13"

permissions:
  contents: read

jobs:
  lint-types:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ inputs.PYTHON_VERSION }}
      - name: Mint App token for private dependencies
        id: dep-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PLATFORM_ADMIN_APP_ID }}
          private-key: ${{ secrets.PLATFORM_ADMIN_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.DEP_REPOS }}
      - name: Authenticate private git dependencies
        # Global so uv's own fetches use it; rewrites the URL the lockfile pins.
        run: git config --global url."https://x-access-token:${{ steps.dep-token.outputs.token }}@github.com/".insteadOf "ssh://git@github.com/"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy ${{ inputs.MYPY_PATH }}

  synth:
    needs: lint-types
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(inputs.ENVS) }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ inputs.PYTHON_VERSION }}
      - name: Mint App token for private dependencies
        id: dep-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PLATFORM_ADMIN_APP_ID }}
          private-key: ${{ secrets.PLATFORM_ADMIN_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.DEP_REPOS }}
      - name: Authenticate private git dependencies
        run: git config --global url."https://x-access-token:${{ steps.dep-token.outputs.token }}@github.com/".insteadOf "ssh://git@github.com/"
      - run: uv sync
      # Run the app directly (no cdk CLI/node); env via CDK_CONTEXT_JSON. app.synth()
      # runs cdk-nag and exits non-zero on SOC2 findings — that is the gate.
      - run: CDK_CONTEXT_JSON='{"env":"${{ matrix.env }}"}' uv run python ${{ inputs.APP }}
