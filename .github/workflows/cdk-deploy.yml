name: Provision infrastructure with CDK

on:
  workflow_call:
    # No secrets declared: callers use `secrets: inherit`. AWS_OIDC_ROLE_ARN is
    # resolved from the ENV GitHub Environment (per-account role); the org secret
    # PLATFORM_ADMIN_APP_PRIVATE_KEY + org var PLATFORM_ADMIN_APP_ID mint a scoped
    # token for private git deps — no long-lived PAT.
    # BREAKING: callers that previously passed secrets explicitly (PAT_GITHUB,
    # AWS_OIDC_ROLE_ARN) must switch to `secrets: inherit`.
    inputs:
      ENV:
        type: string
        required: true
        description: "Environment passed to the CDK app as `-c env=<ENV>` (dev/qa/uat/prod)."
      CDK_STACKS:
        type: string
        required: false
        default: "--all"
        description: "Stack selector(s) for cdk deploy. Defaults to all stacks in the app."
      WORKING_DIRECTORY:
        type: string
        required: false
        default: "."
        description: "Directory containing cdk.json."
      PYTHON_VERSION:
        type: string
        required: false
        default: "3.13"
      NODE_VERSION:
        type: string
        required: false
        default: "20"
      CDK_VERSION:
        type: string
        required: false
        default: "2.1128.0"
        description: "aws-cdk CLI version. Keep compatible with the app's aws-cdk-lib."
      AWS_REGION:
        type: string
        required: false
        default: "us-east-2"
      DEP_REPOS:
        type: string
        required: false
        default: "platform-infra-toolkit"
        description: "Private repo(s) the App token may read for uv sync (newline/space separated)."

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    # Bind to the GitHub Environment named by ENV so env-scoped secrets
    # (AWS_OIDC_ROLE_ARN per account) and deployment protection rules (e.g. a
    # required reviewer on prod) resolve from the caller repo. New environments
    # are auto-created without protection, so existing callers are unaffected
    # unless they configure rules on that environment.
    environment: ${{ inputs.ENV }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ inputs.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.NODE_VERSION }}
      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@${{ inputs.CDK_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: cdk-deploy
          aws-region: ${{ inputs.AWS_REGION }}
      - name: Mint App token for private dependencies
        id: dep-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PLATFORM_ADMIN_APP_ID }}
          private-key: ${{ secrets.PLATFORM_ADMIN_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.DEP_REPOS }}
      - name: Authenticate private git dependencies
        # Global so uv's own fetches use it; rewrites the URL the lockfile pins.
        run: git config --global url."https://x-access-token:${{ steps.dep-token.outputs.token }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install dependencies
        run: uv sync
      - name: CDK synth (runs cdk-nag SOC2 checks)
        run: uv run cdk synth -c env=${{ inputs.ENV }}
      - name: CDK deploy
        run: uv run cdk deploy ${{ inputs.CDK_STACKS }} -c env=${{ inputs.ENV }} --require-approval never
